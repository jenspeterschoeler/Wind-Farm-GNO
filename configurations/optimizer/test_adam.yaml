# defaults:
#   - _self_
#   - batching: GNO_test
#   - validation: GNO_test
#   - lr_schedule: constant

algorithm: adam
n_epochs: 10
resumable: false  # Enable checkpoint-based auto-resume for SLURM resubmission

early_stop:
  start_epoch: 0
  criteria: 1e-7
  patience: 1 # is divided with the rate_of_validation when initialized
