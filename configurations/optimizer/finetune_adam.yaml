# Fine-tuning optimizer configuration
# Used for transfer learning from NOJ to SuperGaussian datasets

algorithm: adam
n_epochs: 1000  # Extended epochs for fine-tuning
resumable: false  # Enable checkpoint-based auto-resume for SLURM resubmission

early_stop:
  start_epoch: 50   # Start early stopping after warmup
  criteria: 1e-7    # Stop when validation loss change < criteria
  patience: 200     # Patience of 200 validation intervals
