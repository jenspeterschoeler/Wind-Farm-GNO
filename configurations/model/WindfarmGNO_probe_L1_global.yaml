# L1 (~160% of Vj8) with global conditioning only
# For Phase 1 global context architecture search
#

type: "WindfarmGNO_probe"

# Architecture (same as L1)
latent_size: 128
hidden_layer_size: 320
num_mlp_layers: 2
num_decoder_layers: 4
decoder_hidden_layer_size: 448
decoder_strategy: "separate"
res_net: True

# WT GNN Settings
wt_message_passing_steps: 4

# Probe GNN Settings
probe_message_passing_steps: 1

# Scale outputs
scale_rel_ws: False

use_global_conditioning: True
