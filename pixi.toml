[workspace]
channels = ["conda-forge"]
name = "spo-operator-tests"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
matplotlib = ">=3.10.5,<4"
omegaconf = ">=2.3.0,<3"
wandb = ">=0.21.0,<0.22"
tqdm = ">=4.67.1,<5"
seaborn = ">=0.13.2,<0.14"
pandas = ">=2.3.1,<3"
debugpy = ">=1.8.17,<2"
cuda-version = "12.*"
jax = ">=0.7.2,<0.8"
cuda-cudart = ">=12.9.79,<13"
cuda-libraries = ">=12.9.1,<13"
ipykernel = ">=7.1.0,<8"
pympler = ">=1.1,<2"

[pypi-dependencies]
hydra-core = ">=1.3.2, <2"
hydra-submitit-launcher = ">=1.2.0, <2"
torch-geometric = ">=2.6.1, <3"
jax = { version = ">=0.7.0, <0.8", extras = ["cuda12"] }
optax = ">=0.2.5, <0.3"
orbax-checkpoint = ">=0.11.22, <0.12"
flax = ">=0.11.1, <0.12"
jraph = ">=0.0.6.dev0, <0.0.7"
torch = ">=2.8.0, <3"
py-wake = ">=2.6.14, <3"
